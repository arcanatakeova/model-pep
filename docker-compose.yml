version: '3.8'
services:
  arcana:
    build: .
    env_file: config/.env
    volumes:
      - ./SOUL.md:/app/SOUL.md
      - ./logs:/app/logs
    restart: always
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if not os.path.exists('STOP') else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3

  db:
    image: supabase/postgres:15.6.1.143
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arcana_local}
      POSTGRES_DB: arcana
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: always

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=arcana
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-arcana_n8n}
    restart: always

volumes:
  db_data:
  n8n_data:
