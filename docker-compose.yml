version: '3.8'
services:
  arcana:
    build: .
    env_file: config/.env
    volumes:
      - ./SOUL.md:/app/SOUL.md:ro
      - ./CLAUDE.md:/app/CLAUDE.md:ro
      - ./memory:/app/memory
      - ./logs:/app/logs
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if not os.path.exists('STOP') else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
